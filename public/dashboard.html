<!DOCTYPE html>
<html lang="ru">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Панель управления - TOP SERVICE</title>
    
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">TOP SERVICE</h1>
            <div class="nav-links">
                <span id="userName"></span>
                <a href="/">Главная</a>
                <button onclick="logout()" class="btn-logout">Выйти</button>
            </div>
        </div>
    </nav>

    <section class="dashboard">
        <div class="container">
            <h2>Мои ссылки</h2>
            
            <div class="url-shortener">
                <input type="url" id="urlInput" placeholder="Вставьте ссылку для сокращения" required>
                <button onclick="createShortUrl()" class="btn-shorten">Сократить</button>
            </div>

            <div id="urlsList" class="urls-list">
                
            </div>
        </div>
    </section>

    <script>
        
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user'));
        
        if (!token) {
            window.location.href = '/login';
        }
        
        document.getElementById('userName').textContent = user?.name || user?.email;
        
        
        loadUrls();
        
        async function loadUrls() {
            const response = await fetch('/api/urls', {
                headers: {'Authorization': `Bearer ${token}`}
            });
            
            if (response.ok) {
                const data = await response.json();
                displayUrls(data.urls);
            }
        }
        
        function displayUrls(urls) {
            const container = document.getElementById('urlsList');
            if (urls.length === 0) {
                container.innerHTML = '<p class="no-urls">У вас пока нет ссылок</p>';
                return;
            }
            
            container.innerHTML = urls.map(url => `
                <div class="url-item">
                    <div class="url-info">
                        <p class="original-url">${url.original_url}</p>
                        <a href="http://localhost:8080/s/${url.short_code}" target="_blank" class="short-url">
                            http://localhost:8080/s/${url.short_code}
                        </a>
                        <p class="stats">Кликов: ${url.clicks} | Создано: ${new Date(url.created_at).toLocaleDateString()}</p>
                    </div>
                    <button onclick="deleteUrl('${url.short_code}')" class="btn-delete">Удалить</button>
                </div>
            `).join('');
        }
        
        async function createShortUrl() {
            const urlInput = document.getElementById('urlInput');
            const originalUrl = urlInput.value;
            
            const response = await fetch('/api/urls', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({original_url: originalUrl})
            });
            
            if (response.ok) {
                const data = await response.json();
                alert('Ссылка сокращена: ' + data.short_url);
                urlInput.value = '';
                loadUrls();
            } else {
                const data = await response.json();
                alert('Ошибка: ' + data.error);
            }
        }
        
        async function deleteUrl(shortCode) {
            if (!confirm('Удалить эту ссылку?')) return;
            
            const response = await fetch(`/api/urls/${shortCode}`, {
                method: 'DELETE',
                headers: {'Authorization': `Bearer ${token}`}
            });
            
            if (response.ok) {
                loadUrls();
            } else {
                alert('Ошибка удаления');
            }
        }
        
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/';
        }
    </script>
</body>
</html>
